<!doctype html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) — ID injected at build time from VITE_GA_ID.
         Static <script async> so the browser's preload scanner fetches gtag.js
         immediately during HTML parse, instead of waiting behind the JS bundle. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      // Consent Mode v2: deny everything by default (before config) so GA
      // starts cookieless. The React CMP banner updates this on the visitor's
      // choice; returning visitors are restored from localStorage here.
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        wait_for_update: 500
      });
      try {
        if (localStorage.getItem('cmp-consent-v1') === 'granted') {
          gtag('consent', 'update', { analytics_storage: 'granted' });
        }
      } catch (e) {}
      // Only init for a real id; when VITE_GA_ID is unset Vite leaves the
      // literal "%VITE_GA_ID%" placeholder, which fails this guard.
      if ('%VITE_GA_ID%'.charAt(0) === 'G') {
        gtag('js', new Date());
        gtag('config', '%VITE_GA_ID%');
      }
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gaurav Kumar Dani — Director of Data & AI Products</title>
    <meta name="description" content="Director of Data & AI Products with 14+ years shipping data platforms, AI products, and marketing tech. Metrics-first portfolio and case studies." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
